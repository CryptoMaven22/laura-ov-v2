<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"/><meta content="width=device-width,initial-scale=1" name="viewport"/><title>Grace | Intelligent Operating Environment</title><style>
:root {
  --ink:#101218;
  --muted:#667085;
  --line:#e8e3f4;
  --soft:#fbf9ff;
  --card:#ffffff;
  --purple:#8f54f6;
  --purple2:#6e3dd9;
  --violet:#ede4ff;
  --green:#0f7b5d;
  --amber:#9a6700;
  --red:#b42318;
  --blue:#0f5f8b;
  --shadow:0 20px 64px rgba(28,25,48,.12);
  --shadow2:0 12px 34px rgba(28,25,48,.10);
  --radius:26px;
  --max:1220px;
}
*{box-sizing:border-box}
html{scroll-behavior:smooth}
body{
  margin:0;
  font-family:Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  color:var(--ink);
  background:
    radial-gradient(circle at 14% 0%, rgba(143,84,246,.12), transparent 30%),
    radial-gradient(circle at 88% 20%, rgba(15,123,93,.10), transparent 34%),
    linear-gradient(180deg,#fff 0%,#fbf9ff 48%,#f7f4fb 100%);
  line-height:1.45;
}
a{color:inherit;text-decoration:none}
button{font:inherit}
img{max-width:100%;display:block}
.wrap{width:min(calc(100% - 40px), var(--max));margin:0 auto}
.brand{display:flex;align-items:center;gap:12px;min-width:0;flex:0 0 auto}
.mark{width:42px;height:42px;border-radius:16px;background:linear-gradient(135deg,var(--purple),var(--purple2));display:grid;place-items:center;box-shadow:0 14px 28px rgba(143,84,246,.22)}
.mark svg{width:26px;height:26px;stroke:#fff;fill:none;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round}
.brand strong{display:block;font-size:20px;letter-spacing:-.04em}
.brand small{display:block;color:var(--muted);font-weight:700;font-size:12px;margin-top:1px}
.brandLogo{
  height:58px;
  width:auto;
  display:block;
  object-fit:contain;
}
@media(max-width:760px){.brandLogo{height:46px}}

.nav{display:flex;gap:22px;color:var(--muted);font-size:14px;font-weight:750;align-items:center}
.nav a:hover{color:var(--purple2)}
.hero{padding:72px 0 54px}
.heroGrid{display:block;max-width:1040px}
.eyebrow{
  display:inline-flex;align-items:center;gap:8px;
  background:var(--violet);
  border:1px solid rgba(143,84,246,.22);
  color:var(--purple2);
  border-radius:999px;
  padding:8px 12px;
  font-weight:900;
  font-size:12px;
  letter-spacing:.08em;
  text-transform:uppercase;
  margin-bottom:18px;
}
h1{font-size:clamp(56px,8vw,112px);line-height:.9;letter-spacing:-.07em;margin:0 0 22px;max-width:940px}
h2{font-size:clamp(30px,4vw,52px);line-height:.98;letter-spacing:-.055em;margin:0 0 12px}
h3{letter-spacing:-.03em;margin:0 0 8px}
.lead{font-size:22px;color:var(--muted);max-width:820px;margin:0 0 28px}
.actions{display:flex;gap:12px;flex-wrap:wrap;margin-top:18px}
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:8px;
  border-radius:999px;
  border:1px solid transparent;
  padding:13px 18px;
  font-weight:900;
  cursor:pointer;
}
.btn.primary{background:linear-gradient(135deg,var(--purple),var(--purple2));color:#fff;box-shadow:0 14px 28px rgba(143,84,246,.25)}
.btn.secondary{background:#fff;border-color:var(--line);color:#2b2d36}
.heroCard{
  background:#fff;
  border:1px solid var(--line);
  border-radius:32px;
  box-shadow:var(--shadow);
  overflow:hidden;
  position:relative;
}
.heroCard img{width:100%;aspect-ratio:16/10;object-fit:cover;object-position:left center}
.heroOverlay{
  position:absolute;left:18px;right:18px;bottom:18px;
  background:rgba(255,255,255,.91);
  backdrop-filter:blur(16px);
  border:1px solid rgba(255,255,255,.8);
  border-radius:22px;
  padding:18px;
  box-shadow:0 16px 32px rgba(18,16,32,.14);
}
.heroOverlay b{display:block}
.heroOverlay p{margin:4px 0 0;color:var(--muted);font-size:14px}
.section{padding:36px 0}
.card{
  background:var(--card);
  border:1px solid var(--line);
  border-radius:var(--radius);
  box-shadow:var(--shadow2);
}
.pad{padding:24px}
.demoDiscovery{
  padding:20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:20px;
  margin:24px 0;
  border-left:5px solid var(--purple);
}
.demoDiscovery span,.sectionLabel,.panelLabel,.proofBadge,.artifactLabel{
  display:inline-flex;
  align-items:center;
  text-transform:uppercase;
  letter-spacing:.09em;
  color:var(--purple2);
  font-size:11px;
  font-weight:950;
}
.demoDiscovery h3{font-size:26px;margin:6px 0 6px}
.validationLabel{display:block;margin-top:14px;color:var(--purple2);font-size:12px;font-weight:950;text-transform:uppercase;letter-spacing:.09em}
.demoDiscovery p{margin:0;color:var(--muted);max-width:840px}
.discoveryPill{white-space:nowrap;background:var(--violet);border:1px solid #dac9ff;color:var(--purple2);border-radius:999px;padding:8px 10px;font-weight:950;font-size:11px}
.ovShell{
  background:linear-gradient(180deg,#fff,#fbf9ff);
  border:2px solid #d93025;
  border-radius:34px;
  box-shadow:var(--shadow);
  padding:24px;
}
.proofShell{
  margin-top:20px;
  background:linear-gradient(180deg,#fff,#fbf9ff);
  border:1px solid var(--line);
  border-radius:34px;
  box-shadow:var(--shadow);
  padding:24px;
}
.proofShell .replayHead{margin:0 0 12px}
.proofShell .principle{margin-top:14px}
.ovHeader{
  display:flex;justify-content:space-between;align-items:flex-start;gap:22px;
  border-bottom:1px solid var(--line);
  padding-bottom:20px;margin-bottom:18px;
}
.ovHeader h2{margin-top:8px}
.ovHeader p{color:var(--muted);margin:0;max-width:820px}
.mode{white-space:nowrap;background:var(--violet);color:var(--purple2);border:1px solid #dac9ff;border-radius:999px;padding:8px 10px;font-size:11px;font-weight:950}
.spine{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:12px;margin-bottom:16px}
.spine article{
  background:#fff;
  border:1px solid var(--line);
  border-radius:20px;
  padding:16px;
  box-shadow:0 12px 28px rgba(30,25,48,.06);
}
.spine span{display:inline-flex;align-items:center;justify-content:center;color:var(--purple2);font-weight:950;font-size:10px;line-height:1;padding:5px 8px;min-width:30px;background:var(--violet);border:1px solid #dac9ff;border-radius:999px;margin-bottom:10px}
.spine strong{display:block;line-height:1.16;margin-bottom:7px}
.spine p{margin:0;color:var(--muted);font-size:13px;line-height:1.35}
.spine .recordCard{appearance:none;width:100%;font:inherit;text-align:left;cursor:pointer;background:#fff;border:1px solid var(--line);border-radius:20px;padding:16px;box-shadow:0 12px 28px rgba(30,25,48,.06);transition:transform .18s ease,border-color .18s ease,box-shadow .18s ease}
.spine .recordCard:hover{transform:translateY(-2px);border-color:#cab7ff;box-shadow:0 16px 34px rgba(66,38,128,.12)}
.spine .recordCard.active{border-color:var(--purple);box-shadow:0 0 0 2px rgba(124,58,237,.12),0 16px 34px rgba(66,38,128,.13)}
.spine .recordCard small{display:block;margin:-2px 0 9px;color:var(--muted);font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.06em}
.spine .recordCard em{display:block;margin-top:11px;color:var(--purple2);font-size:12px;font-style:normal;font-weight:900}
.spine .recordCard:focus-visible{outline:3px solid rgba(124,58,237,.28);outline-offset:2px}
.recordExpand{display:block;margin:-2px 0 18px;background:#17131f;color:#fff;border-radius:22px;padding:18px;box-shadow:0 14px 32px rgba(27,21,48,.16);overflow:hidden}
.recordExpand[hidden]{display:none}
.recordExpandTop{display:flex;justify-content:space-between;align-items:flex-start;gap:16px;margin-bottom:14px}
.recordExpandTop span{display:block;color:#d8c8ff;text-transform:uppercase;letter-spacing:.09em;font-size:11px;font-weight:950;margin-bottom:5px}
.recordExpandTop h3{margin:0;color:#fff;font-size:21px;letter-spacing:-.025em}
.recordExpandTop strong{color:#d8c8ff;font-size:12px;white-space:nowrap}
.recordExpandGrid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px}
.recordExpandGrid article{background:#241b31;border:1px solid rgba(255,255,255,.10);border-radius:15px;padding:12px}
.recordExpandGrid span{display:block;color:#bca9e8;text-transform:uppercase;letter-spacing:.08em;font-size:10px;font-weight:950;margin-bottom:5px}
.recordExpandGrid p{margin:0;color:#fff;font-size:13px;line-height:1.38}
.recordExpandAction{margin-top:12px;padding:11px 13px;border-radius:14px;background:#fff;color:var(--purple2);font-size:13px;font-weight:900}
.recordCard[aria-expanded="true"]{border-color:var(--purple);box-shadow:0 0 0 2px rgba(124,58,237,.12),0 16px 34px rgba(66,38,128,.13)}
.workspace{display:grid;grid-template-columns:.95fr 1.05fr;gap:16px;align-items:start}
.queue,.detail{border-radius:24px;padding:18px}
.queue{background:#17131f;color:#fff}
.detail{background:#fff;border:1px solid var(--line)}
.panelTop{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:14px}
.panelTop strong{font-size:12px;color:inherit;opacity:.68}
.queueList{display:grid;gap:11px}
.queueItem{
  width:100%;
  text-align:left;
  color:inherit;
  background:#241b31;
  border:1px solid rgba(255,255,255,.10);
  border-radius:18px;
  padding:14px;
  cursor:pointer;
  display:grid;
  grid-template-columns:minmax(0,1fr) auto;
  gap:12px;
  transition:transform .18s ease,border-color .18s ease,background .18s ease;
}
.queueItem:hover,.queueItem.active{background:#2c2140;border-color:#d6c2ff;transform:translateY(-1px)}
.queueItem h3{font-size:16px;margin-bottom:5px}
.queueItem p{margin:0;color:#d7cceb;font-size:13px;line-height:1.35}
.queueChip{align-self:start;border-radius:999px;background:#fff;color:var(--purple2);padding:6px 9px;font-size:11px;font-weight:950;white-space:nowrap}
.metaRow{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:8px;margin-top:11px}
.metaRow div{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:8px}
.metaRow dt{font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:#b9acd9;font-weight:950;margin-bottom:3px}
.metaRow dd{margin:0;color:#fff;font-size:12px;line-height:1.25}
.detail h2{font-size:32px;margin-bottom:14px}
.detailGrid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}
.detailGrid div{background:#fbf9ff;border:1px solid var(--line);border-radius:16px;padding:14px}
.detailGrid span{display:block;font-size:11px;text-transform:uppercase;letter-spacing:.09em;font-weight:950;color:var(--purple2);margin-bottom:7px}
.detailGrid p{margin:0;color:var(--muted);font-size:14px;line-height:1.42}
.detailGrid div.wide{grid-column:1/-1}
.contactWorkspace{grid-template-columns:repeat(2,minmax(0,1fr));gap:16px;align-items:start}
.contactColumn{border-radius:24px;padding:18px;min-width:0}
.buyersColumn{background:#17131f;color:#fff}
.sellersColumn{background:#fff;color:var(--ink);border:1px solid var(--line)}
.contactList{display:grid;gap:12px}
.contactRecord{position:relative;border-radius:18px;padding:15px;min-width:0}
.buyersColumn .contactRecord{background:#241b31;border:1px solid rgba(255,255,255,.11)}
.sellersColumn .contactRecord{background:#fbf9ff;border:1px solid var(--line)}
.contactRecordTop{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:7px}
.contactRecord h3{margin:0;font-size:17px;line-height:1.2;letter-spacing:-.015em}
.contactRecord p{margin:0;font-size:13px;line-height:1.42}
.buyersColumn .contactRecord p{color:#d7cceb}
.sellersColumn .contactRecord p{color:var(--muted)}
.contactChip{flex:none;border-radius:999px;padding:6px 9px;font-size:10px;font-weight:950;white-space:nowrap}
.buyersColumn .contactChip{background:#fff;color:var(--purple2)}
.sellersColumn .contactChip{background:#eee7ff;color:var(--purple2);border:1px solid #d9c9ff}
.contactMeta{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:8px;margin-top:12px}
.contactMeta div{border-radius:12px;padding:9px;min-width:0}
.buyersColumn .contactMeta div{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08)}
.sellersColumn .contactMeta div{background:#fff;border:1px solid var(--line)}
.contactMeta dt{font-size:9px;letter-spacing:.09em;text-transform:uppercase;font-weight:950;margin-bottom:4px}
.buyersColumn .contactMeta dt{color:#b9acd9}
.sellersColumn .contactMeta dt{color:var(--purple2)}
.contactMeta dd{margin:0;font-size:12px;line-height:1.28;overflow-wrap:anywhere}
.buyersColumn .contactMeta dd{color:#fff}
.sellersColumn .contactMeta dd{color:var(--ink)}
@media(max-width:900px){.contactWorkspace{grid-template-columns:1fr}.contactMeta{grid-template-columns:repeat(3,minmax(0,1fr))}}
@media(max-width:560px){.contactMeta{grid-template-columns:1fr}.contactRecordTop{flex-direction:column}.contactChip{align-self:flex-start}}

.contactWorkspace{margin-top:18px;display:grid!important;grid-template-columns:minmax(0,1fr) minmax(0,1fr)!important;gap:18px!important;align-items:start!important}
.contactColumn{min-height:100%;padding:20px!important}
.contactColumn .panelTop{align-items:flex-start;margin-bottom:16px;padding-bottom:14px;border-bottom:1px solid rgba(255,255,255,.10)}
.sellersColumn .panelTop{border-bottom-color:var(--line)}
.contactColumn .panelTop h2{font-size:25px;line-height:1.05;margin:5px 0 0;letter-spacing:-.035em}
.contactColumn .panelTop strong{padding-top:3px;white-space:nowrap}
.contactList{display:grid!important;grid-template-columns:1fr!important;gap:12px!important}
.contactRecord{display:block!important;min-height:168px}
@media(max-width:900px){.contactWorkspace{grid-template-columns:1fr!important}.contactRecord{min-height:auto}}
.replayHead{display:flex;justify-content:space-between;align-items:end;gap:18px;margin:24px 0 12px}
.replayHead p{margin:4px 0 0;color:var(--muted)}
.replay{
  background:#17131f;
  color:#fff;
  border-radius:30px;
  padding:18px;
  box-shadow:0 22px 70px rgba(27,21,48,.26);
  overflow:hidden;
  position:relative;
}
.replay:before{content:"";position:absolute;right:-90px;bottom:-130px;width:340px;height:340px;border-radius:50%;background:rgba(143,84,246,.16)}
.replayGrid{display:grid;grid-template-columns:.75fr 1.25fr;gap:16px;position:relative}
.messagePane,.flowPane{border-radius:22px;padding:18px}
.messagePane{background:#fff;color:var(--ink);border:1px solid rgba(255,255,255,.16)}
.messagePane h3,.flowPane h3{font-size:14px;text-transform:uppercase;letter-spacing:.09em;color:var(--muted);margin-bottom:12px}
.messageBubble{border-radius:18px;padding:13px 14px;box-shadow:0 10px 26px rgba(28,25,48,.08);font-size:14px;line-height:1.35;margin-bottom:10px;opacity:0;transform:translateY(12px)}
.replay.run .messageBubble{animation:showBubble .42s ease forwards}
.messageBubble:nth-child(2){animation-delay:.4s}
.messageBubble:nth-child(3){animation-delay:1.4s}
.messageBubble:nth-child(4){animation-delay:2.4s}
.messageBubble.inbound{background:#f8f7fb;border:1px solid var(--line)}
.messageBubble.system{background:#f2ecff;border:1px solid #dfd0ff}
.messageBubble.outbound{background:#101218;color:#fff}
.messageBubble b{display:block;font-size:11px;text-transform:uppercase;letter-spacing:.08em;opacity:.72;margin-bottom:4px}
.flowPane{background:#181321;color:#fff;position:relative;min-height:330px}
.track{position:relative;height:118px;margin-bottom:16px}
.trackLine{position:absolute;left:36px;right:36px;top:44px;height:3px;background:rgba(255,255,255,.18);border-radius:99px;overflow:hidden}
.trackLine:after{content:"";display:block;height:100%;width:0;background:linear-gradient(90deg,var(--purple),var(--green));border-radius:99px}
.replay.run .trackLine:after{animation:trackFill 6s ease both}
.packet{position:absolute;top:33px;left:26px;width:24px;height:24px;border-radius:50%;background:#fff;box-shadow:0 0 0 9px rgba(143,84,246,.22),0 12px 30px rgba(143,84,246,.35)}
.replay.run .packet{animation:packetRun 6s ease both}
.nodes{position:relative;z-index:2;display:grid;grid-template-columns:repeat(5,1fr);gap:6px}
.node{text-align:center;font-size:11px;font-weight:900;color:#cfc5e7}
.nodeIcon{width:48px;height:48px;margin:0 auto 8px;border-radius:16px;background:#241b34;border:1px solid rgba(255,255,255,.10);display:grid;place-items:center}
.replay.run .node:nth-child(1) .nodeIcon{animation:nodePulse .7s .2s ease both}
.replay.run .node:nth-child(2) .nodeIcon{animation:nodePulse .7s 1.25s ease both}
.replay.run .node:nth-child(3) .nodeIcon{animation:nodePulse .7s 2.35s ease both}
.replay.run .node:nth-child(4) .nodeIcon{animation:nodePulse .7s 3.55s ease both}
.replay.run .node:nth-child(5) .nodeIcon{animation:nodePulse .7s 4.85s ease both}
.nodeIcon svg{width:22px;height:22px;stroke:#fff;stroke-width:2.2;fill:none;stroke-linecap:round;stroke-linejoin:round}
.log{display:grid;gap:9px}
.log div{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.11);border-radius:14px;padding:10px 12px;color:#e8e0fb;font-size:13px;opacity:0;transform:translateY(8px)}
.replay.run .log div{animation:showBubble .42s ease forwards}
.replay.run .log div:nth-child(1){animation-delay:.65s}
.replay.run .log div:nth-child(2){animation-delay:1.75s}
.replay.run .log div:nth-child(3){animation-delay:2.85s}
.replay.run .log div:nth-child(4){animation-delay:4.05s}
.replay.run .log div:nth-child(5){animation-delay:5.15s}
.principle{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px;margin-top:16px}
.principle article{background:#fff;border:1px solid var(--line);border-radius:18px;padding:14px;box-shadow:0 12px 28px rgba(30,25,48,.06)}
.principle span{display:block;color:var(--purple2);font-size:12px;font-weight:950;text-transform:uppercase;letter-spacing:.1em;margin-bottom:6px}
.principle p{margin:0;color:var(--muted);font-size:13px}
.proofGrid{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:14px}
.proofCard{overflow:hidden;cursor:pointer;transition:transform .18s ease,box-shadow .18s ease;border:1px solid var(--line)}
.proofCard:hover{transform:translateY(-3px);box-shadow:0 22px 50px rgba(28,25,48,.14)}
.proofImage{background:#f4f2fb;min-height:170px;display:grid;place-items:center;overflow:hidden}
.proofImage img{width:100%;height:190px;object-fit:cover}
.proofImage.phone img{object-fit:cover;height:290px;object-position:top center}
.proofBody{padding:14px 16px 16px}
.proofBody h3{font-size:17px;margin:8px 0 6px}
.proofBody p{margin:0;color:var(--muted);font-size:13px;line-height:1.4}
.proofBadge{padding:4px 7px;line-height:1;border-radius:999px;background:var(--violet);border:1px solid #dac9ff}
.modal{position:fixed;inset:0;z-index:1000;display:none;align-items:center;justify-content:center;background:rgba(15,18,32,.72);backdrop-filter:blur(10px);padding:20px}
.modal.open{display:flex}
.modalPanel{width:min(1180px,96vw);max-height:92vh;background:#fff;border-radius:28px;overflow:hidden;box-shadow:0 34px 100px rgba(0,0,0,.35)}
.modalTop{display:flex;align-items:center;justify-content:space-between;gap:18px;padding:16px 18px;border-bottom:1px solid var(--line);background:linear-gradient(180deg,#fff,#faf9ff)}
.modalTitle{font-weight:950;font-size:18px}
.modalCaption{font-size:13px;color:var(--muted);margin-top:2px}
.modalClose{border:1px solid var(--line);background:#fff;border-radius:999px;padding:9px 12px;font-weight:950;cursor:pointer}
.modalBody{background:#f7f7fb;padding:16px;overflow:auto;max-height:calc(92vh - 82px)}
.modalBody img{width:100%;height:auto;border-radius:16px;border:1px solid var(--line);background:#fff}
body.modalLocked{overflow:hidden}
footer{border-top:1px solid var(--line);background:#fff;margin-top:36px}
.foot{min-height:66px;display:flex;justify-content:center;align-items:center;color:var(--muted);font-size:14px;font-weight:800}
@keyframes showBubble{to{opacity:1;transform:translateY(0)}}
@keyframes trackFill{to{width:100%}}
@keyframes packetRun{0%{left:26px}20%{left:calc(25% - 12px)}42%{left:calc(50% - 12px)}65%{left:calc(75% - 12px)}100%{left:calc(100% - 50px)}}
@keyframes nodePulse{0%{transform:scale(1)}45%{transform:scale(1.12);box-shadow:0 0 0 10px rgba(143,84,246,.16)}100%{transform:scale(1)}}
@media(max-width:1100px){
  .heroGrid,.workspace,.replayGrid{grid-template-columns:1fr}
  .spine{grid-template-columns:repeat(2,minmax(0,1fr))}
  .recordExpandGrid,.principle{grid-template-columns:repeat(2,minmax(0,1fr))}
  .proofGrid{grid-template-columns:repeat(2,minmax(0,1fr))}
}
@media(max-width:760px){
  .nav{display:none}
  .brand strong{font-size:18px}
